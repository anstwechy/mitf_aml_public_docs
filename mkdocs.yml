# FlowGuard public docs — MkDocs Material theme aligned with MITF Wallet (teal / emerald + coral accent).
# Local: pip install -r requirements.txt && mkdocs serve
# Site:  https://anstwechy.github.io/mitf_aml_public_docs/
site_name: FlowGuard documentation
site_description: FlowGuard AML platform — technical and product documentation
site_author: Masarat
site_url: https://anstwechy.github.io/mitf_aml_public_docs/
repo_url: https://github.com/anstwechy/mitf_aml_public_docs
repo_name: GitHub
edit_uri: edit/main/docs/
copyright: >
  Masarat &middot; <a href="https://masarat.ly/">masarat.ly</a>

docs_dir: docs
site_dir: site

validation:
  nav:
    omitted_files: info
  links:
    not_found: info
    absolute_links: relative_to_docs
    unrecognized_links: info

exclude_docs: |
  /site/**

nav:
  - "FlowGuard at a glance": README.md
  - "Masarat": masarat.md
  - "Architecture & design": ARCHITECTURE.md
  - Glossary: GLOSSARY.md
  - Backend integration: BACKEND-INTEGRATION-GUIDE.md
  - Tenant & ingestion keys: TENANT_INGESTION_KEYS.md
  - Integrations:
      - Masarat MITF / wallet: integrations/masarat-wallet-flowguard-integration.md
  - ML:
      - Detection enhancements: ML_DETECTION_ENHANCEMENTS.md
      - Wallet roadmap: ML_WALLET_ROADMAP.md
  - Developers: developers/README.md
  - Bank & stakeholders:
      - Overview: bank/README.md
      - Executive: bank/executive-overview.md
      - Compliance: bank/compliance-and-supervision.md
      - Governance & operations: bank/governance-and-operations.md
      - Vendor procurement: bank/vendor-procurement-guide.md
  - Operations: operations/aml-transaction-queue-runbook.md
  - Team runbooks:
      - Index: team-runbooks/README.md
      - Operations: team-runbooks/operations-runbook.md
      - Deployment: team-runbooks/deployment-runbook.md
      - Security: team-runbooks/security-runbook.md

theme:
  name: material
  custom_dir: overrides
  logo: assets/masarat-logo.png
  favicon: assets/favicon.png
  language: en
  font:
    text: Inter
    code: Fira Code
  palette:
    - scheme: slate
      primary: teal
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: green
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tracking
    - navigation.path
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - content.tooltips
    - toc.follow

markdown_extensions:
  - attr_list
  - tables
  - admonition
  - toc:
      permalink: true
  # Diagrams: https://squidfunk.github.io/mkdocs-material/reference/diagrams/
  # Use fence_code_format (pre > code.mermaid). Material's bundle loads Mermaid — not fence_div_format.
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.details
  - pymdownx.betterem
  - pymdownx.smartsymbols
  - pymdownx.magiclink
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

extra:
  masarat_logo_dark: assets/masarat-logo-dark.png
  generator: false
  site_description: |
    Diátaxis-structured reference for the FlowGuard AML platform — developers, runbooks, bank stakeholders, and integrations.
  social:
    - icon: fontawesome/solid/globe
      link: https://masarat.ly/
    - icon: fontawesome/brands/github
      link: https://github.com/anstwechy/mitf_aml_public_docs

extra_css:
  - stylesheets/extra.css

strict: false

plugins:
  - search
